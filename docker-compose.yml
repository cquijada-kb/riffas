services:
  mongo:
    image: mongo:7
    container_name: riffas-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./riffas
      dockerfile: Dockerfile
    container_name: riffas-api
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ./riffas/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/rifas_db
      PORT: 3000
    ports:
      - '3000:3000'

  public-frontend:
    build:
      context: ./rifas-publico
      dockerfile: Dockerfile
    container_name: riffas-public
    restart: unless-stopped
    depends_on:
      - backend

  admin-frontend:
    build:
      context: ./rifas-backend-app
      dockerfile: Dockerfile
    container_name: riffas-admin
    restart: unless-stopped
    depends_on:
      - backend

  gateway:
    image: nginx:1.27-alpine
    container_name: riffas-gateway
    restart: unless-stopped
    depends_on:
      - public-frontend
      - admin-frontend
      - backend
    ports:
      - '80:80'
    volumes:
      - ./infra/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo_data:
