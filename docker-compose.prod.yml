services:
  backend:
    build:
      context: ./riffas
      dockerfile: Dockerfile
    container_name: riffas-api-prod
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      PORT: 3000

  public-frontend:
    build:
      context: ./rifas-publico
      dockerfile: Dockerfile
    container_name: riffas-public-prod
    restart: unless-stopped
    depends_on:
      - backend

  admin-frontend:
    build:
      context: ./rifas-backend-app
      dockerfile: Dockerfile
    container_name: riffas-admin-prod
    restart: unless-stopped
    depends_on:
      - backend

  gateway:
    image: nginx:1.27-alpine
    container_name: riffas-gateway-prod
    restart: unless-stopped
    depends_on:
      - public-frontend
      - admin-frontend
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/gateway.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
